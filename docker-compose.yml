services:
  postgres:
    image: postgres:16-alpine
    container_name: minierp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: minierpdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d minierpdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./MiniERP.Api
      dockerfile: Dockerfile
    container_name: minierp-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=minierpdb;Username=postgres;Password=postgres"
      Jwt__Key: "SUPER_SECRET_KEY_12345678901234567890123456789012"
      Jwt__Issuer: "MiniERP.Api"
      Jwt__Audience: "MiniERP.Client"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./MiniERP.Web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    container_name: minierp-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
